[main]
experiment_dir = /path/to/training/ctc_wac_experiment
model_name = english_ctc_wac
sample_rate = 16000
# CTC context is intentionally larger than the normal openWakeWord 2 s clip.
ctc_context_seconds = 2.56
# Inspect up to this many consecutive base CTC windows without resetting the
# streaming ONNX cache.  2 means a 5.12 s maximum CTC candidate range.
ctc_window_count = 2
# Augmented short clips remain variable length: sample this much leading real
# background context, then append the active source (subject to the 5.12 s cap).
ctc_leading_context_seconds_range = [1.0, 2.0]
clip_seconds = 2.0
seed = 1337
pipeline_checkpoint_dir = ${main:experiment_dir}/pipeline_state
execution_mode = local

[steps]
# First run: --to stage1_report.  Inspect the report, edit keyword thresholds,
# then run --from train.  Feature bundles remain valid after threshold edits.
steps =
    augment.positive_train,
    augment.negative_train,
    augment.positive_dev,
    augment.negative_dev,
    feature.positive_train,
    feature.negative_train,
    feature.positive_dev,
    feature.negative_dev,
    stage1_report,
    train,
    export,
    testing.positive,
    testing.background

[ctc_stage1]
model = /path/to/stage1-export/stage1-wuw.int8.onnx
contract = /path/to/stage1-export/stage1-wuw.contract.json
keyword_tokens = /path/to/wenet_ctc_keyword_tokens.json
keywords = /path/to/wenet_ctc_keywords.json
device = cpu
candidate_pre_margin_frames = 3
candidate_post_margin_frames = 0

# The source is always at the end when shorter than 2.56 s.  The full window
# contains a background bed, so front context is natural audio rather than zeros.
[augment.positive_train]
input_jsonl = /path/to/positive/train.jsonl
audio_base_dir = /path/to/positive
noise_jsonl = /path/to/background/train.jsonl
noise_audio_base_dir = /path/to/background
output_dir = ${main:experiment_dir}/augmented/positive_train
output_manifest = ${main:experiment_dir}/augmented/positive_train.jsonl
rounds = 1
snr_low = -5
snr_high = 15
artificial_probability = 0.0
random_gain_db = 0.0
placement = end
ctc_context = yes
window_seconds = ${main:ctc_context_seconds}
window_count = ${main:ctc_window_count}
leading_context_seconds_range = ${main:ctc_leading_context_seconds_range}
long_audio_mode = filter
workers = 4

[augment.negative_train]
input_jsonl = /path/to/background/train.jsonl
audio_base_dir = /path/to/background
noise_jsonl = /path/to/background/train.jsonl
noise_audio_base_dir = /path/to/background
output_dir = ${main:experiment_dir}/augmented/negative_train
output_manifest = ${main:experiment_dir}/augmented/negative_train.jsonl
rounds = 1
snr_low = -5
snr_high = 15
artificial_probability = 0.0
random_gain_db = 0.0
placement = end
ctc_context = yes
window_seconds = ${main:ctc_context_seconds}
window_count = ${main:ctc_window_count}
leading_context_seconds_range = ${main:ctc_leading_context_seconds_range}
long_audio_mode = random
workers = 4

[augment.positive_dev]
input_jsonl = /path/to/positive/dev.jsonl
audio_base_dir = /path/to/positive
noise_jsonl = /path/to/background/dev.jsonl
noise_audio_base_dir = /path/to/background
output_dir = ${main:experiment_dir}/augmented/positive_dev
output_manifest = ${main:experiment_dir}/augmented/positive_dev.jsonl
rounds = 1
snr_low = -5
snr_high = 15
artificial_probability = 0.0
random_gain_db = 0.0
placement = end
ctc_context = yes
window_seconds = ${main:ctc_context_seconds}
window_count = ${main:ctc_window_count}
leading_context_seconds_range = ${main:ctc_leading_context_seconds_range}
long_audio_mode = filter
workers = 4

[augment.negative_dev]
input_jsonl = /path/to/background/dev.jsonl
audio_base_dir = /path/to/background
noise_jsonl = /path/to/background/dev.jsonl
noise_audio_base_dir = /path/to/background
output_dir = ${main:experiment_dir}/augmented/negative_dev
output_manifest = ${main:experiment_dir}/augmented/negative_dev.jsonl
rounds = 1
snr_low = -5
snr_high = 15
artificial_probability = 0.0
random_gain_db = 0.0
placement = end
ctc_context = yes
window_seconds = ${main:ctc_context_seconds}
window_count = ${main:ctc_window_count}
leading_context_seconds_range = ${main:ctc_leading_context_seconds_range}
long_audio_mode = random
workers = 4

[feature.positive_train]
extractor = wenet_ctc_wac
input_jsonl = ${augment.positive_train:output_manifest}
label = 1
split = train
output_file = ${main:experiment_dir}/features/positive_train.npy
stage1_model = ${ctc_stage1:model}
stage1_contract = ${ctc_stage1:contract}
keyword_tokens = ${ctc_stage1:keyword_tokens}
candidate_pre_margin_frames = ${ctc_stage1:candidate_pre_margin_frames}
candidate_post_margin_frames = ${ctc_stage1:candidate_post_margin_frames}
window_seconds = ${main:ctc_context_seconds}
window_count = ${main:ctc_window_count}
device = ${ctc_stage1:device}

[feature.negative_train]
extractor = wenet_ctc_wac
input_jsonl = ${augment.negative_train:output_manifest}
label = 0
split = train
output_file = ${main:experiment_dir}/features/negative_train.npy
stage1_model = ${ctc_stage1:model}
stage1_contract = ${ctc_stage1:contract}
keyword_tokens = ${ctc_stage1:keyword_tokens}
candidate_pre_margin_frames = ${ctc_stage1:candidate_pre_margin_frames}
candidate_post_margin_frames = ${ctc_stage1:candidate_post_margin_frames}
window_seconds = ${main:ctc_context_seconds}
window_count = ${main:ctc_window_count}
device = ${ctc_stage1:device}

[feature.positive_dev]
extractor = wenet_ctc_wac
input_jsonl = ${augment.positive_dev:output_manifest}
label = 1
split = dev
output_file = ${main:experiment_dir}/features/positive_dev.npy
stage1_model = ${ctc_stage1:model}
stage1_contract = ${ctc_stage1:contract}
keyword_tokens = ${ctc_stage1:keyword_tokens}
candidate_pre_margin_frames = ${ctc_stage1:candidate_pre_margin_frames}
candidate_post_margin_frames = ${ctc_stage1:candidate_post_margin_frames}
window_seconds = ${main:ctc_context_seconds}
window_count = ${main:ctc_window_count}
device = ${ctc_stage1:device}

[feature.negative_dev]
extractor = wenet_ctc_wac
input_jsonl = ${augment.negative_dev:output_manifest}
label = 0
split = dev
output_file = ${main:experiment_dir}/features/negative_dev.npy
stage1_model = ${ctc_stage1:model}
stage1_contract = ${ctc_stage1:contract}
keyword_tokens = ${ctc_stage1:keyword_tokens}
candidate_pre_margin_frames = ${ctc_stage1:candidate_pre_margin_frames}
candidate_post_margin_frames = ${ctc_stage1:candidate_post_margin_frames}
window_seconds = ${main:ctc_context_seconds}
window_count = ${main:ctc_window_count}
device = ${ctc_stage1:device}

[stage1_report]
features = feature.positive_train, feature.negative_train, feature.positive_dev, feature.negative_dev
output_json = ${main:experiment_dir}/stage1_report/candidates.json
output_report = ${main:experiment_dir}/stage1_report/candidates.md
threshold_start = -5.0
threshold_stop = 0.0
threshold_step = 0.05

[train]
structure = ctc_wac
keywords = ${ctc_stage1:keywords}
train = feature.positive_train, feature.negative_train
dev = feature.positive_dev, feature.negative_dev
batch.feature.positive_train = 64
batch.feature.negative_train = 128
length_bucket_width_frames = 8
steps = 5000
phase_step_ratios = [1.0, 0.1]
phase_learning_rates = [0.0003, 0.00003]
wac.frame_hidden = 128
wac.frame_layers = 3
wac.head_hidden = 128
wac.dropout = 0.1
max_negative_weight = 3
resume = yes
checkpoint_interval_steps = 500
keep_checkpoints = 3
model_checkpoint_dir = ${main:experiment_dir}/model_checkpoints
output_model = ${main:experiment_dir}/trained_model/${main:model_name}.pt
output_summary = ${main:experiment_dir}/trained_model/training_summary.json

[export]
input_model = ${train:output_model}
output_model = ${main:experiment_dir}/trained_model/${main:model_name}.onnx
opset_version = 13
verify = yes

[testing.common]
structure = ctc_wac
model = ${export:output_model}
stage1_model = ${ctc_stage1:model}
stage1_contract = ${ctc_stage1:contract}
keywords = ${ctc_stage1:keywords}
stage1_device = cpu
candidate_pre_margin_frames = ${ctc_stage1:candidate_pre_margin_frames}
candidate_post_margin_frames = ${ctc_stage1:candidate_post_margin_frames}
window_seconds = ${main:ctc_context_seconds}
window_count = ${main:ctc_window_count}
threshold_range = [0.1, 0.9]
threshold_step = 0.1
debounce_seconds = 1.0

[testing.positive]
structure = ${testing.common:structure}
input_jsonl = /path/to/positive/test.jsonl
audio_base_dir = /path/to/positive
expected_label = 1
model = ${testing.common:model}
stage1_model = ${testing.common:stage1_model}
stage1_contract = ${testing.common:stage1_contract}
keywords = ${testing.common:keywords}
stage1_device = ${testing.common:stage1_device}
candidate_pre_margin_frames = ${testing.common:candidate_pre_margin_frames}
candidate_post_margin_frames = ${testing.common:candidate_post_margin_frames}
window_seconds = ${testing.common:window_seconds}
window_count = ${testing.common:window_count}
threshold_range = ${testing.common:threshold_range}
threshold_step = ${testing.common:threshold_step}
debounce_seconds = ${testing.common:debounce_seconds}
output_dir = ${main:experiment_dir}/evaluation/positive

[testing.background]
structure = ${testing.common:structure}
input_jsonl = /path/to/background/test.jsonl
audio_base_dir = /path/to/background
expected_label = 0
model = ${testing.common:model}
stage1_model = ${testing.common:stage1_model}
stage1_contract = ${testing.common:stage1_contract}
keywords = ${testing.common:keywords}
stage1_device = ${testing.common:stage1_device}
candidate_pre_margin_frames = ${testing.common:candidate_pre_margin_frames}
candidate_post_margin_frames = ${testing.common:candidate_post_margin_frames}
window_seconds = ${testing.common:window_seconds}
window_count = ${testing.common:window_count}
threshold_range = ${testing.common:threshold_range}
threshold_step = ${testing.common:threshold_step}
debounce_seconds = ${testing.common:debounce_seconds}
limit_negative_seconds = 3600
output_dir = ${main:experiment_dir}/evaluation/background
