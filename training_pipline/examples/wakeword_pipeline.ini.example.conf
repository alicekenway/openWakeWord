[main]
experiment_dir = /path/to/training/expts6
model_name = wakeword_model
model_assets_dir = /path/to/openwakeword_models
sample_rate = 16000
clip_seconds = 2.0
seed = 1337
pipeline_checkpoint_dir = ${main:experiment_dir}/pipeline_state

[steps]
steps =
    augment.positive_train,
    augment.negative_cv_train,
    feature.positive_train,
    feature.positive_dev,
    feature.negative_cv_train,
    feature.negative_cv_dev,
    feature.background_train,
    feature.background_dev,
    train,
    export,
    testing.positive,
    testing.negative_cv,
    testing.background

[augment.common]
noise_jsonl = /path/to/background/train.jsonl
noise_audio_base_dir = /path/to/background
rounds = 1
snr_low = -5.0
snr_high = 15.0
artificial_probability = 0.15
random_gain_db = 3.0
workers = 8

[augment.positive_train]
input_jsonl = /path/to/positive/train.jsonl
audio_base_dir = /path/to/positive
noise_jsonl = ${augment.common:noise_jsonl}
noise_audio_base_dir = ${augment.common:noise_audio_base_dir}
rounds = ${augment.common:rounds}
snr_low = ${augment.common:snr_low}
snr_high = ${augment.common:snr_high}
artificial_probability = ${augment.common:artificial_probability}
random_gain_db = ${augment.common:random_gain_db}
workers = ${augment.common:workers}
placement = end
output_dir = ${main:experiment_dir}/audio/augmented/positive_train
output_manifest = ${main:experiment_dir}/audio/augmented/positive_train.jsonl

[augment.negative_cv_train]
input_jsonl = /path/to/negative_cv/train.jsonl
audio_base_dir = /path/to/negative_cv
noise_jsonl = ${augment.common:noise_jsonl}
noise_audio_base_dir = ${augment.common:noise_audio_base_dir}
rounds = ${augment.common:rounds}
snr_low = ${augment.common:snr_low}
snr_high = ${augment.common:snr_high}
artificial_probability = ${augment.common:artificial_probability}
random_gain_db = ${augment.common:random_gain_db}
workers = ${augment.common:workers}
placement = random
output_dir = ${main:experiment_dir}/audio/augmented/negative_cv_train
output_manifest = ${main:experiment_dir}/audio/augmented/negative_cv_train.jsonl

[feature.common]
model_dir = ${main:model_assets_dir}
batch_size = 256
audio_loader_workers = 8
prefetch_batches = 2
ncpu = 12
device = auto

[feature.positive_train]
input_jsonl = ["/path/to/positive/train.jsonl", "${augment.positive_train:output_manifest}"]
audio_base_dir = /path/to/positive
label = 1
split = train
placement = end
output_file = ${main:experiment_dir}/features/positive_train.npy
model_dir = ${feature.common:model_dir}
batch_size = ${feature.common:batch_size}
audio_loader_workers = ${feature.common:audio_loader_workers}
prefetch_batches = ${feature.common:prefetch_batches}
ncpu = ${feature.common:ncpu}
device = ${feature.common:device}

[feature.positive_dev]
input_jsonl = /path/to/positive/dev.jsonl
audio_base_dir = /path/to/positive
label = 1
split = dev
placement = end
output_file = ${main:experiment_dir}/features/positive_dev.npy
model_dir = ${feature.common:model_dir}
batch_size = ${feature.common:batch_size}
audio_loader_workers = ${feature.common:audio_loader_workers}
prefetch_batches = ${feature.common:prefetch_batches}
ncpu = ${feature.common:ncpu}
device = ${feature.common:device}

[feature.negative_cv_train]
input_jsonl = ["/path/to/negative_cv/train.jsonl", "${augment.negative_cv_train:output_manifest}"]
audio_base_dir = /path/to/negative_cv
label = 0
split = train
placement = random
output_file = ${main:experiment_dir}/features/negative_cv_train.npy
model_dir = ${feature.common:model_dir}
batch_size = ${feature.common:batch_size}
audio_loader_workers = ${feature.common:audio_loader_workers}
prefetch_batches = ${feature.common:prefetch_batches}
ncpu = ${feature.common:ncpu}
device = ${feature.common:device}

[feature.negative_cv_dev]
input_jsonl = /path/to/negative_cv/dev.jsonl
audio_base_dir = /path/to/negative_cv
label = 0
split = dev
placement = random
output_file = ${main:experiment_dir}/features/negative_cv_dev.npy
model_dir = ${feature.common:model_dir}
batch_size = ${feature.common:batch_size}
audio_loader_workers = ${feature.common:audio_loader_workers}
prefetch_batches = ${feature.common:prefetch_batches}
ncpu = ${feature.common:ncpu}
device = ${feature.common:device}

[feature.background_train]
input_jsonl = /path/to/background/train.jsonl
audio_base_dir = /path/to/background
label = 0
split = train
placement = random
output_file = ${main:experiment_dir}/features/background_train.npy
model_dir = ${feature.common:model_dir}
batch_size = ${feature.common:batch_size}
audio_loader_workers = ${feature.common:audio_loader_workers}
prefetch_batches = ${feature.common:prefetch_batches}
ncpu = ${feature.common:ncpu}
device = ${feature.common:device}

[feature.background_dev]
input_jsonl = /path/to/background/dev.jsonl
audio_base_dir = /path/to/background
label = 0
split = dev
placement = random
output_file = ${main:experiment_dir}/features/background_dev.npy
model_dir = ${feature.common:model_dir}
batch_size = ${feature.common:batch_size}
audio_loader_workers = ${feature.common:audio_loader_workers}
prefetch_batches = ${feature.common:prefetch_batches}
ncpu = ${feature.common:ncpu}
device = ${feature.common:device}

[train]
train = feature.positive_train, feature.negative_cv_train, feature.background_train
dev = feature.positive_dev, feature.negative_cv_dev
false_positive = feature.background_dev
batch.feature.positive_train = 128
batch.feature.negative_cv_train = 128
batch.feature.background_train = 128
steps = 20000
phase_step_ratios = [1.0, 0.1, 0.1]
phase_learning_rates = [0.0001, 0.00001, 0.000001]
model_type = dnn
layer_size = 64
# Choose `cnn` or `attention` to use the new temporal classifier heads.
# DNN and RNN continue to use layer_size; CNN and attention use the model.*
# settings below. Remove the leading # on the architecture you select.
#
# model_type = cnn
# model.channels = 128
# model.expansion = 1
# model.dropout = 0.05
# model.classifier_hidden = 64
# model.cnn_kernels = [3, 5, 3, 3]
# model.cnn_dilations = [1, 1, 2, 4]
# model.cnn_use_se = [false, false, true, true]
#
# model_type = attention
# model.channels = 128
# model.expansion = 1
# model.dropout = 0.05
# model.classifier_hidden = 64
# model.attention_time_steps = 16
# model.attention_num_heads = 4
# model.attention_ff_multiplier = 2
# model.attention_local_kernels = [3, 3]
# model.attention_local_dilations = [1, 2]
# model.attention_local_use_se = [false, false]
max_negative_weight = 100
target_false_positives_per_hour = 0.5
require_cuda = no
mixed_precision = no
resume = yes
checkpoint_interval_steps = 500
keep_checkpoints = 3
model_checkpoint_dir = ${main:experiment_dir}/model_checkpoints
output_model = ${main:experiment_dir}/trained_model/${main:model_name}.pt
output_summary = ${main:experiment_dir}/trained_model/training_summary.json

[export]
input_model = ${train:output_model}
output_model = ${main:experiment_dir}/trained_model/${main:model_name}.onnx
opset_version = 13
verify = yes

[testing.common]
model = ${export:output_model}
model_dir = ${main:model_assets_dir}
threshold_range = [0.1, 0.9]
threshold_step = 0.2
debounce_seconds = 1.0
chunk_size = 1280
model_window_seconds = 2.0

[testing.positive]
input_jsonl = /path/to/positive/test.jsonl
audio_base_dir = /path/to/positive
expected_label = 1
model = ${testing.common:model}
model_dir = ${testing.common:model_dir}
threshold_range = ${testing.common:threshold_range}
threshold_step = ${testing.common:threshold_step}
debounce_seconds = ${testing.common:debounce_seconds}
chunk_size = ${testing.common:chunk_size}
model_window_seconds = ${testing.common:model_window_seconds}
output_dir = ${main:experiment_dir}/evaluation/positive
output_report = ${main:experiment_dir}/evaluation/positive/threshold_summary.md

[testing.negative_cv]
input_jsonl = /path/to/negative_cv/test.jsonl
audio_base_dir = /path/to/negative_cv
expected_label = 0
model = ${testing.common:model}
model_dir = ${testing.common:model_dir}
threshold_range = ${testing.common:threshold_range}
threshold_step = ${testing.common:threshold_step}
debounce_seconds = ${testing.common:debounce_seconds}
chunk_size = ${testing.common:chunk_size}
model_window_seconds = ${testing.common:model_window_seconds}
output_dir = ${main:experiment_dir}/evaluation/negative_cv
output_report = ${main:experiment_dir}/evaluation/negative_cv/threshold_summary.md

[testing.background]
input_jsonl = /path/to/background/test.jsonl
audio_base_dir = /path/to/background
expected_label = 0
model = ${testing.common:model}
model_dir = ${testing.common:model_dir}
threshold_range = ${testing.common:threshold_range}
threshold_step = ${testing.common:threshold_step}
debounce_seconds = ${testing.common:debounce_seconds}
chunk_size = ${testing.common:chunk_size}
model_window_seconds = ${testing.common:model_window_seconds}
output_dir = ${main:experiment_dir}/evaluation/background
output_report = ${main:experiment_dir}/evaluation/background/threshold_summary.md
